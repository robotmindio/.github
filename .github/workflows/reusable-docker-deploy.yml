name: Reusable Docker Build & Deploy

# Reads deploy.config.json from the calling repo:
#
#   Single image (Dockerfile at repo root):
#     {"image": "landing", "chart": "charts/landing"}
#
#   Single image with target:
#     {"image": "robotmind-app", "chart": "charts/robotmind-app", "target": "runner"}
#
#   Multiple images (Dockerfiles at docker/{name}/Dockerfile):
#     {"images": ["provisioning", "widget-gateway"], "chart": "charts/cikut-identity"}
#
#   Multiple images with overrides:
#     {"images": [
#       "provisioning",
#       {"name": "widget-gateway", "dockerfile": "docker/widget/Dockerfile"}
#     ], "chart": "charts/cikut-identity"}
#
#   Custom values-images.yaml key mapping (default: image name as key):
#     {"images": ["provisioning"], "chart": "charts/cikut-identity",
#      "values-keys": {"provisioning": "provisioning.image.tag"}}
#
#   Monorepo context — checkout extra repos into a workspace:
#     {"image": "robotmind-app", "chart": "charts/robotmind-app", "target": "runner",
#      "context": {"root": "app.robotmind.io", "extra-repos": ["packages"]}}
#
#     This checks out the calling repo into workspace/app.robotmind.io/
#     and robotmindio/packages into workspace/packages/.
#     Docker build runs from workspace/ (the monorepo root).

on:
  workflow_call:
    secrets:
      ROBOTMIND_APP_ID:
        description: "GitHub App ID for cross-repo checkout"
        required: false
      ROBOTMIND_APP_PRIVATE_KEY:
        description: "GitHub App private key for cross-repo checkout"
        required: false

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: _main

      - name: Read deploy config
        id: config
        run: |
          if [[ ! -f _main/deploy.config.json ]]; then
            echo "::error::deploy.config.json not found in repo root"
            exit 1
          fi
          echo "config=$(cat _main/deploy.config.json | jq -c '.')" >> $GITHUB_OUTPUT

      - name: Setup workspace
        run: |
          config='${{ steps.config.outputs.config }}'
          has_context=$(echo "$config" | jq 'has("context")')

          if [[ "$has_context" == "true" ]]; then
            # Monorepo mode: move main repo into workspace/{root}
            root=$(echo "$config" | jq -r '.context.root')
            mkdir -p workspace
            mv _main "workspace/$root"
            echo "BUILD_CONTEXT=workspace" >> $GITHUB_ENV
            echo "REPO_DIR=workspace/$root" >> $GITHUB_ENV
          else
            # Single-repo mode: build from repo root
            mv _main workspace
            echo "BUILD_CONTEXT=workspace" >> $GITHUB_ENV
            echo "REPO_DIR=workspace" >> $GITHUB_ENV
          fi

      - name: Generate GitHub App token for extra repos
        id: app-token
        if: fromJSON(steps.config.outputs.config).context.extra-repos != null
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.ROBOTMIND_APP_ID }}
          private-key: ${{ secrets.ROBOTMIND_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout extra repos
        if: fromJSON(steps.config.outputs.config).context.extra-repos != null
        run: |
          config='${{ steps.config.outputs.config }}'
          TOKEN="${{ steps.app-token.outputs.token || github.token }}"
          echo "$config" | jq -r '.context["extra-repos"][]' | while read -r repo; do
            echo "Checking out $repo..."
            git clone --depth 1 \
              "https://x-access-token:${TOKEN}@github.com/${{ github.repository_owner }}/$repo.git" \
              "workspace/$repo"
          done

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx (remote builder)
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: ${{ env.BUILDX_BUILDER_URL }}
        if: env.BUILDX_BUILDER_URL != ''

      - name: Set up Buildx (fallback)
        uses: docker/setup-buildx-action@v3
        if: env.BUILDX_BUILDER_URL == ''

      - name: Set image tag
        run: echo "TAG=$(git -C $REPO_DIR rev-parse --short=8 HEAD)" >> $GITHUB_ENV

      - name: Build and push images
        run: |
          config='${{ steps.config.outputs.config }}'
          registry="ghcr.io/${{ github.repository_owner }}"
          tag="${{ env.TAG }}"

          # Normalize to array of {name, dockerfile, target}
          images=$(echo "$config" | jq -c '
            if .image then
              [{
                name: .image,
                dockerfile: (.dockerfile // "Dockerfile"),
                target: (.target // null)
              }]
            else
              [.images[] |
                if type == "string" then
                  {name: ., dockerfile: ("docker/" + . + "/Dockerfile"), target: null}
                else
                  {name: .name, dockerfile: (.dockerfile // ("docker/" + .name + "/Dockerfile")), target: (.target // null)}
                end
              ]
            end
          ')

          # Prepend repo dir to dockerfile path if not in monorepo mode
          has_context=$(echo "$config" | jq 'has("context")')
          if [[ "$has_context" == "true" ]]; then
            root=$(echo "$config" | jq -r '.context.root')
            prefix="$root/"
          else
            prefix=""
          fi

          # Build all images in parallel
          mapfile -t img_configs < <(echo "$images" | jq -c '.[]')
          pids=()
          logdir=$(mktemp -d)

          for img in "${img_configs[@]}"; do
            name=$(echo "$img" | jq -r '.name')
            dockerfile=$(echo "$img" | jq -r '.dockerfile')
            target=$(echo "$img" | jq -r '.target // empty')

            (
              set -o pipefail
              echo "[$name] Starting build..."
              # Remote BuildKit builder has persistent cache — no cache flags needed.
              # Fall back to GHA cache for GitHub-hosted runners.
              cache_args=""
              if [[ -z "${BUILDX_BUILDER_URL:-}" ]]; then
                cache_args="--cache-from type=gha,scope=$name --cache-to type=gha,mode=max,scope=$name"
              fi

              docker buildx build \
                --push \
                --tag "$registry/$name:$tag" \
                --tag "$registry/$name:latest" \
                --label "org.opencontainers.image.source=https://github.com/$GITHUB_REPOSITORY" \
                $cache_args \
                ${target:+--target "$target"} \
                -f "$BUILD_CONTEXT/${prefix}${dockerfile}" "$BUILD_CONTEXT" \
                > "$logdir/$name.log" 2>&1
              echo "[$name] Build complete"
            ) &
            pids+=($!)
          done

          # Wait for all builds and collect failures
          failed=()
          for i in "${!pids[@]}"; do
            if ! wait "${pids[$i]}"; then
              name=$(echo "${img_configs[$i]}" | jq -r '.name')
              failed+=("$name")
            fi
          done

          # Print logs for all images
          for img in "${img_configs[@]}"; do
            name=$(echo "$img" | jq -r '.name')
            echo "::group::Build log: $name"
            cat "$logdir/$name.log" 2>/dev/null || echo "No log available"
            echo "::endgroup::"
          done

          if [[ ${#failed[@]} -gt 0 ]]; then
            echo "::error::Failed to build: ${failed[*]}"
            exit 1
          fi

      - name: Generate values-images.yaml
        run: |
          config='${{ steps.config.outputs.config }}'
          chart_path=$(echo "$config" | jq -r '.chart')
          tag="${{ env.TAG }}"

          names=$(echo "$config" | jq -r '
            if .image then [.image]
            else [.images[] | if type == "string" then . else .name end]
            end | .[]
          ')

          values_keys=$(echo "$config" | jq -c '.["values-keys"] // {}')

          {
            echo "# Auto-updated by CI — do not edit manually"
            for name in $names; do
              custom_key=$(echo "$values_keys" | jq -r --arg n "$name" '.[$n] // empty')
              if [[ -n "$custom_key" ]]; then
                IFS='.' read -ra parts <<< "$custom_key"
                indent=""
                for ((i=0; i<${#parts[@]}-1; i++)); do
                  echo "${indent}${parts[$i]}:"
                  indent="$indent  "
                done
                echo "${indent}${parts[-1]}: \"$tag\""
              else
                echo "${name}:"
                echo "  image:"
                echo "    tag: \"$tag\""
              fi
            done
          } > "$REPO_DIR/$chart_path/values-images.yaml"

          echo "--- $chart_path/values-images.yaml ---"
          cat "$REPO_DIR/$chart_path/values-images.yaml"

      - name: Commit and push image tags
        run: |
          chart_path=$(echo '${{ steps.config.outputs.config }}' | jq -r '.chart')
          cd "$REPO_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$chart_path/values-images.yaml"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update image tags to ${{ env.TAG }} [skip ci]"

          # Retry push with rebase to handle concurrent CI runs
          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "::warning::Push failed (attempt $attempt/$MAX_RETRIES), rebasing and retrying..."
            git pull --rebase
          done
          echo "::error::Failed to push image tags after $MAX_RETRIES attempts"
          exit 1
